# Push image to Amazon ECR. Wire ECS/App Runner/Elastic Beanstalk to pull this image (see repo README or platform docs).
name: Deploy — build and push to AWS ECR

on:
  workflow_dispatch:

env:
  ECR_REPOSITORY: sprint-planner

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f dockerfile -t "$REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG" -t "$REGISTRY/${{ env.ECR_REPOSITORY }}:latest" .
          docker push "$REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG"
          docker push "$REGISTRY/${{ env.ECR_REPOSITORY }}:latest"
