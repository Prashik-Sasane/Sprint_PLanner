# Push image to Azure Container Registry. Deploy with Container Apps, App Service (Web App for Containers), or AKS.
name: Deploy — build and push to Azure ACR

on:
  workflow_dispatch:

env:
  IMAGE_NAME: sprint-planner

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Build and push
        env:
          TAG: ${{ github.sha }}
        run: |
          IMAGE="${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:$TAG"
          docker build -f dockerfile -t "$IMAGE" -t "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest" .
          docker push "$IMAGE"
          docker push "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"
